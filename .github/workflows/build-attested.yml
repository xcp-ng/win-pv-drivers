name: build-attested

on:
  workflow_call:
    inputs:
      environment:
        type: string
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options:
          - Dev
          - Prod
        default: Dev

jobs:
  build-drivers:
    uses: ./.github/workflows/build-drivers.yml
    with:
      environment: ${{inputs.environment}}
  build-guestagent:
    uses: ./.github/workflows/build-guestagent.yml
    with:
      environment: ${{inputs.environment}}
  build-timeprovider:
    uses: ./.github/workflows/build-timeprovider.yml
    with:
      environment: ${{inputs.environment}}
  build-xstdvga:
    uses: ./.github/workflows/build-xstdvga.yml
    with:
      environment: ${{inputs.environment}}
  build-attested:
    runs-on: ubuntu-latest
    needs:
      - build-drivers
      - build-guestagent
      - build-timeprovider
      - build-xstdvga
    permissions:
      id-token: write
      contents: read
      attestations: write
    environment:
      name: ${{inputs.environment}}
      deployment: false
    steps:
      - name: Download drivers
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: .
          pattern: "{drivers,guestagent,timeprovider,xstdvga}"
          merge-multiple: true
          skip-decompress: true
      - name: Attest artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            drivers.zip
            guestagent.zip
            timeprovider.zip
            xstdvga.zip
