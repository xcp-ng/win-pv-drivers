name: Attest artifact

on:
  workflow_call:
    inputs:
      subject-name:
        required: true
        type: string
      subject-digest:
        required: true
        type: string
      catalog-name:
        required: false
        type: string

permissions:
  id-token: write
  contents: read
  attestations: write

jobs:
  attest:
    runs-on: ubuntu-latest
    steps:
      - name: Attest artifact
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{inputs.subject-name}}
          subject-digest: ${{inputs.subject-digest}}
      - name: Download catalog
        if: ${{inputs.catalog-name != ''}}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: catalog/
          name: ${{inputs.catalog-name}}
      - name: Attest catalog
        if: ${{inputs.catalog-name != ''}}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: catalog/${{inputs.catalog-name}}.csv
