name: build-guestagent

on:
  workflow_call:

jobs:
  build-guestagent:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Configure branding
        run: Set-Content -Path branding.ps1 -Value $Env:XCPNG_WINPV_BRANDING -Force
        env:
          XCPNG_WINPV_BRANDING: ${{vars.XCPNG_WINPV_BRANDING}}
      - name: Build guest agent
        run: .\build-guestagent.ps1 -Configuration release
      - name: Clean up certificates
        run: Remove-Item Cert:\CurrentUser\My\* -ErrorAction SilentlyContinue
      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: guestagent
          path: |
            xen-guest-agent/target/release/*.exe
            xen-guest-agent/target/release/*.pdb
            xen-guest-agent/target/release/.fingerprint/
    outputs:
      subject-name: guestagent
      subject-digest: sha256:${{steps.upload.outputs.artifact-digest}}

  attest-guestagent:
    needs: [build-guestagent]
    uses: ./.github/workflows/attest.yml
    permissions:
      id-token: write
      contents: read
      attestations: write
    with:
      subject-name: ${{needs.build-guestagent.outputs.subject-name}}
      subject-digest: ${{needs.build-guestagent.outputs.subject-digest}}

  selfsign-guestagent:
    needs: [build-guestagent]
    runs-on: windows-latest
    env:
      SIGNER: ${{vars.XCPNG_WINPV_SIGNER}}
    steps:
      # for the sign scripts
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          path: xen-guest-agent/target/release/
          name: guestagent
      - name: Install certificate
        run: |
          $pfxBytes = [System.Convert]::FromBase64String($Env:SIGNER_PFX_BASE64)
          $pfxPath = Join-Path $pwd "Signer.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          try {
            certutil -importpfx -f -user -p "" my $pfxPath nochain
            if ($LASTEXITCODE -ne 0) {
                throw "certutil failed with error $LASTEXITCODE"
            }
          } finally {
            Remove-Item -Force $pfxPath
          }
        env:
          SIGNER_PFX_BASE64: ${{secrets.SIGNER_PFX_BASE64}}
      - name: Sign artifact
        run: |
          . .\scripts\sign.ps1
          Set-SignerFileSignature (Get-ChildItem xen-guest-agent\target\release -File -Recurse -Include *.dll, *.exe)
      - name: Clean up certificates
        run: Remove-Item Cert:\CurrentUser\My\* -ErrorAction SilentlyContinue
      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          path: xen-guest-agent/target/release/
          name: guestagent-signed
