name: build-guestagent

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-guestagent:
    runs-on: windows-latest
    env:
      WINPV_OUTPUT: xen-guest-agent/target/release
      WINPV_CATALOG: catalog.csv
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Add cargo-auditable
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -Type Directory -Path $Env:RUNNER_TEMP/tools/
          Invoke-WebRequest -Uri $Env:CARGO_AUDITABLE_URI -OutFile $Env:RUNNER_TEMP\tools\cargo-auditable.zip
          if ((Get-FileHash $Env:RUNNER_TEMP\tools\cargo-auditable.zip -Algorithm SHA256).Hash -ine $Env:CARGO_AUDITABLE_SHA256) {
            throw "cargo-auditable failed verification"
          }
          Expand-Archive $Env:RUNNER_TEMP\tools\cargo-auditable.zip -DestinationPath $Env:RUNNER_TEMP\tools\cargo-auditable -Force
          Add-Content -Path $Env:GITHUB_PATH -Value "$Env:RUNNER_TEMP\tools\cargo-auditable" -Force
        env:
          CARGO_AUDITABLE_URI: https://github.com/rust-secure-code/cargo-auditable/releases/download/v0.7.4/cargo-auditable-x86_64-pc-windows-msvc.zip
          CARGO_AUDITABLE_SHA256: e2da8d873978982381269c27be8b76cfd4084fbf99c43bd83231ac9c714488bb
      - name: Configure branding
        uses: ./.github/actions/branding
        with:
          branding-data: ${{toJson(vars)}}
      - name: Build guest agent
        run: .\build-guestagent.ps1 -Configuration release
      - name: Catalog guest agent
        run: |
          Import-Module .\scripts\artifact.psm1 -Force
          Get-ArtifactCatalog -Path .\$Env:WINPV_OUTPUT -Include *.exe |
          Export-Csv -NoTypeInformation .\$Env:WINPV_OUTPUT\$Env:WINPV_CATALOG
      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: guestagent
          path: |
            ${{env.WINPV_OUTPUT}}/*.exe
            ${{env.WINPV_OUTPUT}}/*.pdb
            ${{env.WINPV_OUTPUT}}/${{env.WINPV_CATALOG}}
    outputs:
      output-path: ${{env.WINPV_OUTPUT}}
      output-sha256: ${{steps.upload.outputs.artifact-digest}}
      catalog-name: ${{env.WINPV_CATALOG}}
