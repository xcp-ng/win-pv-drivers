name: build-guestagent

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-guestagent:
    runs-on: windows-latest
    env:
      WINPV_OUTPUT: xen-guest-agent/target/release
      WINPV_CATALOG: catalog.csv
      X_CARGO_AUDITABLE_VERSION: 0.7.2
    steps:
      - name: Restore cargo auditable
        id: restore-cargo-auditable
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~\.cargo\bin\
          key: ${{runner.os}}-cargo-auditable-${{env.X_CARGO_AUDITABLE_VERSION}}
      - name: Install cargo auditable
        if: steps.restore-cargo-auditable.outputs.cache-hit != 'true'
        run: cargo install cargo-auditable@${{env.X_CARGO_AUDITABLE_VERSION}} --locked
      - name: Save cargo auditable
        if: steps.restore-cargo-auditable.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~\.cargo\bin\
          key: ${{steps.restore-cargo-auditable.outputs.cache-primary-key}}
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Configure branding
        uses: ./.github/actions/branding
        with:
          branding-data: ${{toJson(vars)}}
      - name: Build guest agent
        run: .\build-guestagent.ps1 -Configuration release
      - name: Catalog guest agent
        run: |
          Import-Module .\scripts\artifact.psm1 -Force
          Get-ArtifactCatalog -Path .\$Env:WINPV_OUTPUT -Include *.exe |
          Export-Csv -NoTypeInformation .\$Env:WINPV_OUTPUT\$Env:WINPV_CATALOG
      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: guestagent
          path: |
            ${{env.WINPV_OUTPUT}}/*.exe
            ${{env.WINPV_OUTPUT}}/*.pdb
            ${{env.WINPV_OUTPUT}}/${{env.WINPV_CATALOG}}
    outputs:
      output-path: ${{env.WINPV_OUTPUT}}
      output-sha256: ${{steps.upload.outputs.artifact-digest}}
      catalog-name: ${{env.WINPV_CATALOG}}
