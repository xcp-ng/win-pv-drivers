name: build-xstdvga

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-xstdvga:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Add MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Add CodeQL
        id: add_codeql
        uses: github/codeql-action/init@v4.32.3
        with:
          build-mode: none
      - name: Add CodeQL to PATH
        run: Resolve-Path "${{steps.add_codeql.outputs.codeql-path}}\.." | Add-Content -Path $Env:GITHUB_PATH -Force
      - name: Download packs
        run: |
          codeql pack download microsoft/windows-drivers@1.8.2 microsoft/cpp-queries@0.0.4
          if ($LASTEXITCODE -ne 0) {
            throw "CodeQL download failed with error $LASTEXITCODE"
          }
      - name: Configure branding
        run: .\scripts\branding-ci.ps1 -OutFile .\branding.ps1
        env:
          VENDOR_NAME: ${{vars.VENDOR_NAME}}
          PRODUCT_NAME: ${{vars.PRODUCT_NAME}}
          VENDOR_PREFIX: ${{vars.VENDOR_PREFIX}}
          COPYRIGHT: ${{vars.COPYRIGHT}}
          FORCE_ACTIVATE: ${{vars.FORCE_ACTIVATE}}
          FORCE_UNPLUG: ${{vars.FORCE_UNPLUG}}
          PackageVersions_Product: ${{vars.PackageVersions_Product}}.${{github.run_number}}
          PackageVersions_xenbus: ${{vars.PackageVersions_xenbus}}.${{github.run_number}}
          PackageVersions_xencons: ${{vars.PackageVersions_xencons}}.${{github.run_number}}
          PackageVersions_xenhid: ${{vars.PackageVersions_xenhid}}.${{github.run_number}}
          PackageVersions_xeniface: ${{vars.PackageVersions_xeniface}}.${{github.run_number}}
          PackageVersions_xennet: ${{vars.PackageVersions_xennet}}.${{github.run_number}}
          PackageVersions_xenvbd: ${{vars.PackageVersions_xenvbd}}.${{github.run_number}}
          PackageVersions_xenvif: ${{vars.PackageVersions_xenvif}}.${{github.run_number}}
          PackageVersions_xenvkbd: ${{vars.PackageVersions_xenvkbd}}.${{github.run_number}}
          PackageVersions_XenClean: ${{vars.PackageVersions_XenClean}}.${{github.run_number}}
          PackageVersions_XenBootFix: ${{vars.PackageVersions_XenBootFix}}.${{github.run_number}}
          PackageVersions_XenGuestAgent: ${{vars.PackageVersions_XenGuestAgent}}.${{github.run_number}}
          PackageVersions_XenTimeProvider: ${{vars.PackageVersions_XenTimeProvider}}.${{github.run_number}}
          PackageVersions_xstdvga: ${{vars.PackageVersions_xstdvga}}.${{github.run_number}}
          MSI_UPGRADE_CODE_X86: ${{vars.MSI_UPGRADE_CODE_X86}}
          MSI_UPGRADE_CODE_X64: ${{vars.MSI_UPGRADE_CODE_X64}}
      - name: Build xstdvga
        run: .\build-xstdvga.ps1 -Configuration Release -Platform x64
      - name: Catalog xstdvga
        run: |
          Import-Module .\scripts\artifact.psm1 -Force
          Get-ArtifactCatalog -Path .\xstdvga\vs2022\x64\Release\xstdvga -Include *.sys |
          Export-Csv -NoTypeInformation xstdvga-catalog.csv
      - name: Upload xstdvga
        id: upload
        uses: actions/upload-artifact@v6
        with:
          path: xstdvga/vs2022/x64/Release/xstdvga
          name: xstdvga
      - name: Upload xstdvga catalog
        uses: actions/upload-artifact@v6
        with:
          path: xstdvga-catalog.csv
          name: xstdvga-catalog
    outputs:
      subject-name: xstdvga
      subject-digest: sha256:${{steps.upload.outputs.artifact-digest}}
      catalog-name: xstdvga-catalog

  attest-xstdvga:
    needs: [build-xstdvga]
    uses: ./.github/workflows/attest.yml
    permissions:
      id-token: write
      contents: read
      attestations: write
    with:
      subject-name: ${{needs.build-xstdvga.outputs.subject-name}}
      subject-digest: ${{needs.build-xstdvga.outputs.subject-digest}}
      catalog-name: ${{needs.build-xstdvga.outputs.catalog-name}}

  selfsign-xstdvga:
    needs: [build-xstdvga]
    runs-on: windows-latest
    steps:
      # for the sign scripts
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          path: xstdvga/vs2022/x64/Release/xstdvga/
          name: xstdvga
      - name: Install certificate
        run: .\scripts\signer-ci.ps1 -OutFile .\branding.ps1
        env:
          SIGNER_PFX_BASE64: ${{secrets.SIGNER_PFX_BASE64}}
      - name: Sign artifact
        run: |
          . .\branding.ps1
          . .\scripts\sign.ps1
          Set-SignerFileSignature (Get-ChildItem .\xstdvga\vs2022\x64\Release\xstdvga -File -Recurse -Include *.sys, *.cat)
      - name: Clean up certificates
        if: always()
        run: Remove-Item Cert:\CurrentUser\My\* -ErrorAction SilentlyContinue
      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v6
        with:
          path: xstdvga/vs2022/x64/Release/xstdvga/
          name: xstdvga-signed
